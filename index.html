<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffc2dc,#ffe6f2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* CARD */
.card{
background:white;
width:340px;
padding:30px 20px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(255,105,180,0.3);
position:relative;
}

/* KUCING ANIMASI */
.cat{
font-size:70px;
animation:catDance 2s infinite ease-in-out;
}

@keyframes catDance{
0%{transform:translateY(0) rotate(0deg);}
25%{transform:translateY(-5px) rotate(-5deg);}
50%{transform:translateY(5px) rotate(5deg);}
75%{transform:translateY(-5px) rotate(-5deg);}
100%{transform:translateY(0) rotate(0deg);}
}

h2{
color:#c2185b;
margin:10px 0;
}

p{
color:#555;
margin-bottom:20px;
}

/* BUTTON */
.btn{
padding:12px 25px;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
margin:10px;
transition:0.3s;
font-size:18px;
}

.yes{
background:#ff4d94;
color:white;
}

.no{
background:#ff99bb;
color:white;
}

/* LOVE CONFETTI */
.love{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card" id="card">

<div class="cat">🐱💕</div>

<h2>Do you love me?</h2>
<p id="sub">Jawab yang jujur yaa 😳</p>

<button class="btn yes" id="yesBtn">YES</button>
<button class="btn no" id="noBtn">NO</button>

</div>

<script>

let yesScale = 1;
let noScale = 1;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const sub = document.getElementById("sub");
const card = document.getElementById("card");

/* NO BUTTON */
noBtn.addEventListener("click", ()=>{
    
    yesScale += 0.2;
    yesBtn.style.transform = `scale(${yesScale})`;

    noScale -= 0.2;
    noBtn.style.transform = `scale(${noScale})`;

    sub.innerText = "Ihh jangan gitu dong 😭 pencet YES ajaa";

    if(noScale <= 0.2){
        noBtn.style.display="none";
        sub.innerText="Nahh gitu dong 😌 tinggal YES aja";
    }
});

/* YES BUTTON */
yesBtn.addEventListener("click", ()=>{
card.innerHTML=`
<h2>YEYYY ILY SO MUCH 💕</h2>
<div class="cat">😻💖</div>
<p>Kamu bikin aku paling bahagia 😆💗</p>
`;

loveRain();
});

/* LOVE CONFETTI */
function loveRain(){
for(let i=0;i<40;i++){
let love=document.createElement("div");
love.classList.add("love");
love.innerHTML="💖";
love.style.left=Math.random()*100+"vw";
love.style.animationDuration=(Math.random()*2+3)+"s";
document.body.appendChild(love);
setTimeout(()=>{love.remove();},5000);
}
}
</script>

</body>
</html>
