<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💕</title>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffc2dc,#ffe6f2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* CARD */
.card{
background:white;
width:320px;
padding:30px 20px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(255,105,180,0.3);
position:relative;
}

/* KUCING ANIMASI */
.cat{
font-size:70px;
animation:bounce 1.5s infinite ease-in-out;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.blink{
position:absolute;
top:75px;
left:50%;
transform:translateX(-50%);
width:50px;
height:10px;
background:white;
animation:blink 4s infinite;
}

@keyframes blink{
0%,95%,100%{height:10px}
97%{height:2px}
}

/* TEXT */
h2{
color:#c2185b;
margin:10px 0;
}

p{
color:#555;
margin-bottom:20px;
}

/* BUTTONS */
.btn{
padding:12px 25px;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
margin:10px;
transition:0.3s;
}

.yes{
background:#ff4d94;
color:white;
font-size:18px;
}

.no{
background:#ff99bb;
color:white;
font-size:18px;
}

/* CONFETTI LOVE */
.love{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card" id="card">

<div class="cat">🐱💕</div>

<h2>do u love me..??</h2>
<p id="sub">km salah pencet kahh??</p>

<button class="btn yes" id="yesBtn">YES</button>
<button class="btn no" id="noBtn">NO</button>

</div>

<script>

let yesSize = 18;
let noSize = 18;
let noScale = 1;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const sub = document.getElementById("sub");
const card = document.getElementById("card");

/* NO BUTTON */
noBtn.addEventListener("click", ()=>{
noScale -= 0.2;
noBtn.style.transform = `scale(${noScale})`;

yesSize += 5;
yesBtn.style.fontSize = yesSize + "px";
yesBtn.style.padding = (12 + yesSize/3) + "px " + (25 + yesSize/2) + "px";

if(noScale <= 0.2){
noBtn.style.display="none";
sub.innerHTML="oke km hrs pencet iya, ak maksa 😌";
}
});

/* YES BUTTON */
yesBtn.addEventListener("click", ()=>{
card.innerHTML=`
<h2>YEYYY! ILY SO MUCH 💕</h2>
<div class="cat">😻💖</div>
<p>you just made me the happiest person!</p>
`;

loveRain();
});

/* LOVE CONFETTI */
function loveRain(){
for(let i=0;i<40;i++){
let love=document.createElement("div");
love.classList.add("love");
love.innerHTML="💖";
love.style.left=Math.random()*100+"vw";
love.style.animationDuration=(Math.random()*2+3)+"s";
document.body.appendChild(love);
setTimeout(()=>{love.remove();},5000);
}
}
</script>

</body>
</html>
